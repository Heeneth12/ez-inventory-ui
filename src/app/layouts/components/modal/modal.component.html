<el-dialog>
  <dialog #modalDialog (close)="close()" [class.hidden]="!(modalService.isOpen$ | async)"
    class="fixed inset-0 m-0 size-auto max-h-none max-w-none overflow-hidden bg-transparent p-0 backdrop:bg-transparent [&:not([open])]:hidden">

    <el-dialog-backdrop class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity"
      [attr.data-state]="(modalService.isOpen$ | async) ? 'open' : 'closed'">
    </el-dialog-backdrop>

    <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
      <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">

        <el-dialog-panel [ngClass]="getWidthClass(modalService.size$ | async)"
          class="relative transform overflow-hidden rounded-xl bg-white text-left shadow-xl transition-all sm:w-full sm:my-8">

          <ng-container *ngIf="modalService.state$ | async as modalState">

            <ng-container *ngIf="modalState.template">
              <ng-container *ngTemplateOutlet="modalState.template; context: modalState.context">
              </ng-container>
            </ng-container>

          </ng-container>

          <ng-container #dynamicContainer></ng-container>

        </el-dialog-panel>
      </div>
    </div>
  </dialog>
</el-dialog>
