<div class="w-full flex flex-col h-full bg-white border border-gray-200/60 shadow-sm overflow-hidden">
    <div class="flex-none border-b border-gray-200 bg-white px-2">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-2 overflow-x-auto no-scrollbar px-2">
                @for(tab of tabs; track tab.id){
                <button (click)="selectTab(tab.id)"
                    class="group relative px-3 py-3.5 text-sm font-medium transition-all duration-200 ease-out whitespace-nowrap flex items-center gap-2 rounded-t-lg outline-none"
                    [ngClass]="activeTabId === tab.id ? 'text-indigo-600' : 'text-gray-500 hover:text-gray-900 hover:bg-gray-50/80'">

                    <lucide-icon *ngIf="tab.icon" [img]="tab.icon" class="w-4 h-4"
                        [ngClass]="activeTabId === tab.id ? 'stroke-indigo-600' : 'stroke-gray-400 group-hover:stroke-gray-600'"></lucide-icon>

                    <span>{{ tab.label }}</span>

                    <span *ngIf="tab.count !== undefined"
                        class="ml-0.5 px-2 py-0.5 text-[10px] font-bold rounded-full border transition-all"
                        [ngClass]="activeTabId === tab.id ? 'bg-indigo-50 text-indigo-700 border-indigo-100' : 'bg-gray-100 text-gray-500 border-transparent'">
                        {{ tab.count }}
                    </span>

                    <div class="absolute bottom-0 left-0 right-0 h-[3px] rounded-t-full transition-all duration-300"
                        [ngClass]="activeTabId === tab.id ? 'bg-indigo-600 scale-x-100 opacity-100' : 'bg-transparent scale-x-50 opacity-0'">
                    </div>
                </button>
                }
            </div>

            <div class="pr-4 flex items-center">
                <button
                    class="flex items-center gap-2 px-3 py-1.5 text-xs font-semibold text-gray-600 hover:text-indigo-600 hover:bg-indigo-50 rounded-md transition-all border border-transparent hover:border-indigo-100">
                    <lucide-icon [img]="slidersHorizontal" class="w-4 h-4"></lucide-icon>
                    <span class="text-sm hidden sm:inline">Manage View</span>
                </button>
            </div>
        </div>
    </div>
    <div class="flex-1 bg-white overflow-auto relative">
        <ng-content></ng-content>
    </div>
</div>
